<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCCC - Controle Operacional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --secondary: #64748b; --accent: #ef4444; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #f1f5f9; color: var(--dark); }
        .header { background: var(--dark); color: white; padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary); }
        .clock { font-size: 1.3rem; font-weight: 700; color: #60a5fa; background: #1e293b; padding: 4px 12px; border-radius: 6px; }
        .container { max-width: 1200px; margin: 1rem auto; padding: 0 1rem; }
        .table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 0.8rem; text-align: left; font-size: 0.75rem; color: var(--secondary); border-bottom: 2px solid #e2e8f0; }
        td { padding: 0.7rem 0.8rem; border-bottom: 1px solid #e2e8f0; font-size: 0.85rem; }
        .clickable-time { color: var(--primary); font-weight: 700; cursor: pointer; text-decoration: underline; }
        
        /* Modal e Formulário */
        #modal { display: none; position: fixed; right: 0; top: 0; width: 400px; height: 100%; background: white; box-shadow: -10px 0 25px rgba(0,0,0,0.2); z-index: 1000; border-left: 5px solid var(--primary); }
        .modal-inner { padding: 1.5rem; }
        .form-group { margin-top: 1.5rem; padding: 1rem; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--secondary); }
        .form-group input { width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 4px; margin-bottom: 1rem; box-sizing: border-box; }
        .btn-save { width: 100%; background: var(--success); color: white; border: none; padding: 0.8rem; border-radius: 6px; font-weight: 700; cursor: pointer; }
        .btn-save:disabled { background: #cbd5e1; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
    </style>
</head>
<body>
<div class="header">
    <div style="font-weight: 700;">CONTROLE DE EXECUÇÃO - TCCC</div>
    <div class="clock" id="real-clock">00:00:00</div>
</div>

<div class="container">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Programado ↓</th>
                    <th>Linha</th>
                    <th>Veículo</th>
                    <th>Tripulante</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div id="modal">
    <div class="modal-inner">
        <h3>Registrar Executado</h3>
        <p id="info-selecionada" style="font-size: 0.9rem; color: var(--secondary);"></p>
        
        <div class="form-group">
            <label>HORÁRIO REAL (HH:MM)</label>
            <input type="time" id="input-hora-real">
            
            <label>VEÍCULO REAL</label>
            <input type="text" id="input-veiculo-real" placeholder="Ex: 7411">
            
            <button class="btn-save" id="btn-salvar" onclick="salvarAlteracao()">Salvar Alteração</button>
        </div>
        <div id="status-envio" style="margin-top: 10px; font-size: 0.8rem; text-align: center;"></div>
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTnT2K7KGf-Tr8vC_E4gTgovxgxDNRkUtMAWZv2gHkUdrQDxNaMAUO_I-4tXeV1eSAa2FFH7_k-VD9p/pub?gid=0&single=true&output=csv";
    
    // ATENÇÃO: COLE AQUI A URL DO SEU GOOGLE APPS SCRIPT
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwsNZCB2tgmvxh1FqUYa2pxP4fqnmjQEavwMJRPpUbxzCyfuB3un6UhbngVLJs_EVK_/exec"; 

    let terData = [];
    let itemSelecionado = null;

    setInterval(() => { document.getElementById('real-clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
    window.onload = fetchData;

    function fetchData() {
        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(r) {
                terData = r.data.filter(row => row['Origem'] === 'TER' && !row['Evento'].includes('INTRA-JORNADA'))
                                .sort((a, b) => a['Início'].localeCompare(b['Início']));
                renderTable();
            }
        });
    }

    function renderTable() {
        const b = document.getElementById('table-body'); b.innerHTML = '';
        terData.forEach((row, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="clickable-time" onclick="abrirModal(${index})">${row['Início']}</td>
                <td><b>${row['Linha']}</b></td>
                <td>${row['Veículo']}</td>
                <td><small>${row['Tripulante']}</small></td>`;
            b.appendChild(tr);
        });
    }

    function abrirModal(index) {
        itemSelecionado = terData[index];
        document.getElementById('info-selecionada').innerHTML = `
            <b>Linha:</b> ${itemSelecionado['Linha']}<br>
            <b>Prog:</b> ${itemSelecionado['Início']}<br>
            <b>Tripulante:</b> ${itemSelecionado['Tripulante']}
        `;
        document.getElementById('input-hora-real').value = itemSelecionado['Início'];
        document.getElementById('input-veiculo-real').value = itemSelecionado['Veículo'];
        document.getElementById('modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('status-envio').innerText = '';
    }

    async function salvarAlteracao() {
        const btn = document.getElementById('btn-salvar');
        const status = document.getElementById('status-envio');
        
        const dados = {
            linha: itemSelecionado['Linha'],
            inicioProg: itemSelecionado['Início'],
            horarioReal: document.getElementById('input-hora-real').value,
            veiculoReal: document.getElementById('input-veiculo-real').value,
            tripulante: itemSelecionado['Tripulante']
        };

        btn.disabled = true;
        status.innerText = "Enviando para a planilha...";

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // Necessário para Google Apps Script
                body: JSON.stringify(dados)
            });
            status.style.color = "green";
            status.innerText = "Salvo com sucesso!";
            setTimeout(closeModal, 1500);
        } catch (e) {
            status.style.color = "red";
            status.innerText = "Erro ao salvar.";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
